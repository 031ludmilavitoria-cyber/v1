<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bio Planner</title>
    <link rel="stylesheet" href="../css/login.css">
<link rel="stylesheet" href="imagem-logo.css">
</head>

<body>

<div class="login-container">

    <div class="login-box">
        <h2>Login</h2>

        <form>

                <label class="lbl email">Email</label>
                <div class="input-group">
                        <input type="email" placeholder="Digite seu email" required>
                </div>

            
                <label class="lbl pass">Senha</label>
                <div class="input-group">
                        <input type="password" placeholder="Digite sua senha" required>
                </div>

                <a href="#" class="create">Recuperar senha</a>
                <div class="tipo-usuario">
                    <label>
                        <input type="radio" name="tipo-usuario" value="cliente" checked>
                        Cliente
                    </label>
                    <label>
                        <input type="radio" name="tipo-usuario" value="profissional">
                        Biomédico 
                    </label>
                </div>

                <div class="buttons">
                <button class="btn-primary" href="../html/telaconfigcliente.html">Entrar</button>
                <button class="btn-secondary">Limpar</button>
            </div>

            
        </form>
    </div>

</div>

</body>
</html>
