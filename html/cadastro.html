<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro - Bio Planner</title>
<link rel="stylesheet" href="../css/cadastro.css">

<!-- Ícones -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <div class="logo">
        <img src="logo.png" alt="Logo">
        <h1>Bio Planner</h1>
        <span>BIOMEDICINA ESTÉTICA</span>
    </div>

    <!-- CARD -->
    <div class="card">
        <h2>CADASTRO</h2>

        <form>

            <div class="input-group">
                <i class="fa-regular fa-user"></i>
                <input type="text" placeholder="Nome">
            </div>

            <div class="input-group">
                <i class="fa-regular fa-envelope"></i>
                <input type="email" placeholder="Email">
            </div>

            <div class="input-group">
                <i class="fa-regular fa-calendar"></i>
                <input type="text" placeholder="__/__/____">
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="Senha">
            </div>

            <label class="confirm">Confirme a Senha</label>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="Confirmar senha">
            </div>

            <!-- CHECKBOX -->
            <div class="options">
                <label><input type="checkbox"> Masculino</label>
                <label><input type="checkbox"> Feminino</label>
                <label><input type="checkbox"> Administrador</label>
            </div>

            <!-- BOTÕES -->
            <div class="buttons">
                <button class="btn-primary">Concluir Cadastro</button>
                <button class="btn-secondary">Sair</button>
            </div>

        </form>
    </div>

</div>

</body>
</html>
