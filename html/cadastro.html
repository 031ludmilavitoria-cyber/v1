<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro - Bio Planner</title>
<link rel="stylesheet" href="../css/cadastro.css">
<link rel="stylesheet" href="imagem-logo.css">

<!-- Ícones -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <div class="logo">
        <img src="logo.png" alt="Logo">
        <h1>Bio Planner</h1>
        <span>BIOMEDICINA ESTÉTICA</span>
    </div>

    <!-- CARD -->
    <div class="card">
        <h2>CADASTRO</h2>

        <form>

            <div class="input-group">
                <i class="fa-regular fa-user"></i>
                <input type="text" placeholder="Nome" id="txt-nome">
            </div>

            <div class="input-group">
                <i class="fa-regular fa-envelope"></i>
                <input type="email" placeholder="Email" id="txt-email">
            </div>

            <div class="input-group">
                <i class="fa-regular fa-calendar"></i>
                <input type="date" id="txt-data">
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="Senha" id="txt-senha">
            </div>

            <label class="confirm">Confirme a Senha</label>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="Confirmar senha" id="txt-confirma">
            </div>

            <!-- CHECKBOX -->
            <div class="options">
                <label><input type="checkbox" id="check-masculino"> Masculino</label>
                <label><input type="checkbox" id="check-feminino"> Feminino</label>
                <label><input type="checkbox" id="check-admin"> Administrador</label>
            </div>

            <!-- BOTÕES -->
             <h4 id="lbl-error"></h4>
            <div class="buttons">
                <a class="btn-primary" onclick="cadastrar()">Concluir Cadastro</a>

            </div>

        </form>
    </div>

</div>
<script src="../js/cadastro.js"></script>
</body>
</html>
